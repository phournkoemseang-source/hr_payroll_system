<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Attendance - HRPayroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/staffPortal.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, sans-serif;
      background: #f7f9fc;
      color: #101828;
    }

    button,
    input,
    a {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 298px 1fr;
    }

    .sidebar {
      background: #111d3a;
      color: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, .08);
    }

    .brand {
      padding: 34px 26px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
    }

    .logo {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: #2457f5;
      display: grid;
      place-items: center;
      font: 700 24px Georgia, serif;
      margin-bottom: 14px;
    }

    .brand h2 {
      font-size: 20px;
      font-weight: 800;
    }

    .brand p,
    .side-title,
    .muted,
    .top-sub,
    .user-block span {
      color: #91a0bb;
    }

    .nav {
      padding: 28px 16px;
      display: grid;
      gap: 8px;
    }

    .side-title {
      padding: 0 10px 8px;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .nav a {
      min-height: 49px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      color: #a8b3c8;
      font-weight: 800;
    }

    .nav a.active,
    .nav a:hover {
      background: #2457f5;
      color: #fff;
    }

    .ico {
      width: 22px;
      text-align: center;
      font-size: 21px;
      font-weight: 500;
    }

    .side-footer {
      margin-top: auto;
      min-height: 130px;
      padding: 24px 26px;
      border-top: 1px solid rgba(255, 255, 255, .1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2457f5;
      display: grid;
      place-items: center;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .user-block {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logout {
      border: 0;
      background: transparent;
      color: #9eacc5;
      cursor: pointer;
      font-size: 22px;
    }

    .topbar {
      height: 84px;
      background: #fff;
      border-bottom: 1px solid #dce4ef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 38px;
      gap: 18px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .search,
    .month {
      height: 48px;
      border: 1px solid #c8d3e4;
      border-radius: 8px;
      padding: 0 16px;
      background: #fff;
      color: #172033;
    }

    .search {
      width: min(340px, 35vw);
    }

    .bell {
      width: 50px;
      height: 48px;
      border: 1px solid #d7dfeb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      position: relative;
      font-size: 22px;
      color: #475569;
    }

    .bell::after {
      content: "";
      position: absolute;
      top: 12px;
      right: 12px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
    }

    .page {
      padding: 38px;
      display: grid;
      gap: 28px;
    }

    .page-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
    }

    .page-title h2 {
      font: 700 32px/1.1 "Playfair Display", serif;
    }

    .page-title p {
      margin-top: 8px;
      color: #91a0bb;
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .card,
    .panel {
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, .09);
    }

    .card {
      min-height: 172px;
      padding: 26px 28px;
    }

    .card strong {
      display: block;
      font: 800 34px/1 "Playfair Display", serif;
      margin-bottom: 8px;
    }

    .present {
      color: #079669;
    }

    .absent {
      color: #dc2626;
    }

    .late {
      color: #d97706;
    }

    .leave {
      color: #2457f5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 17px 22px;
      border-bottom: 1px solid #dbe3ef;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #91a0bb;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      font-weight: 500;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 0 12px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .status.present {
      background: #e8fbf2;
      color: #047857;
    }

    .status.absent {
      background: #fff0f0;
      color: #dc2626;
    }

    .status.late {
      background: #fff8e7;
      color: #d97706;
    }

    .status.on_leave {
      background: #edf2ff;
      color: #2457f5;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {

      .topbar,
      .page {
        padding-left: 18px;
        padding-right: 18px;
      }

      .topbar,
      .page-title {
        height: auto;
        padding-top: 16px;
        padding-bottom: 16px;
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .search {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body data-role="staff" data-page="attendance">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">H</div>
        <h2>HRPayroll</h2>
        <p>Management System</p>
      </div>
      <nav class="nav" aria-label="Staff navigation">
        <div class="side-title">My Space</div><a data-nav href="/staff/dashboard.html"><span class="ico"
            data-icon="dashboard"></span>Dashboard</a><a data-nav href="/staff/profile.html"><span class="ico"
            data-icon="user"></span>My Profile</a><a class="active" data-nav href="/staff/attendanceTracking.html"><span
            class="ico" data-icon="calendar"></span>My Attendance</a><a data-nav href="/staff/LeaveRequest.html"><span
            class="ico" data-icon="leave"></span>My Leave</a><a data-nav href="/staff/payslip.html"><span class="ico"
            data-icon="payslip"></span>My Payslip</a>
      </nav>
      <div class="side-footer">
        <div class="user-block">
          <div class="avatar" id="avatarInitial">S</div>
          <div><strong id="sidebarName">-</strong><span>Staff</span></div>
        </div><button class="logout" id="logoutButton" type="button" aria-label="Logout"><span class="button-icon"
            data-icon="logout"></span><span>Logout</span></button>
      </div>
    </aside>
    <main>
      <header class="topbar">
        <div>
          <h1>My Attendance</h1>
          <p class="top-sub">Your personal attendance record</p><span id="userName" hidden>-</span><span id="userRole"
            hidden>Staff</span>
        </div>
        <div class="actions"><input class="search" id="globalSearch" type="search" placeholder="Search..." /><button
            class="bell" id="notificationButton" type="button" aria-label="Notifications"><span
              data-icon="bell"></span></button></div>
      </header>
      <section class="page">
        <div class="page-title">
          <div>
            <h2>My Attendance</h2>
            <p>Your personal attendance history</p>
          </div><input class="month" id="attendanceMonth" type="month" />
        </div>
        <div class="stats">
          <article class="card"><strong class="present" id="presentCount">0</strong><span class="muted">Days
              Present</span></article>
          <article class="card"><strong class="absent" id="absentCount">0</strong><span class="muted">Absent</span>
          </article>
          <article class="card"><strong class="late" id="lateCount">0</strong><span class="muted">Late</span></article>
          <article class="card"><strong class="leave" id="onLeaveCount">0</strong><span class="muted">On Leave</span>
          </article>
        </div>
        <section class="panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Day</th>
                  <th>Status</th>
                  <th>Note</th>
                </tr>
              </thead>
              <tbody id="attendanceBody">
                <tr>
                  <td colspan="4">Loading attendance...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script src="/js/pageTransitions.js"></script>
  <script src="/js/staffIcons.js"></script>
  <script src="/js/staffPortal.js"></script>
</body>

</html>
