<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Leave - HR Payroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: Inter, sans-serif; background: #f6f8fb; color: #111827; overflow-x: hidden; transition: opacity .08s ease; }
    button, input, select, textarea, a { font: inherit; }
    .topbar { height: 76px; background: #fff; border-bottom: 1px solid #dbe3ef; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
    .page { max-width: 1180px; margin: 0 auto; padding: 34px 24px 48px; display: grid; gap: 24px; }
    h1 { font-size: 32px; line-height: 1.1; font-weight: 800; }
    h2 { font-size: 18px; font-weight: 800; }
    .muted, .subtitle { color: #93a1ba; }
    .subtitle { font-weight: 600; margin-top: 8px; }
    .grid { display: grid; grid-template-columns: minmax(320px, 520px) minmax(420px, 1fr); gap: 24px; align-items: start; }
    .panel { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; box-shadow: 0 4px 14px rgba(15, 23, 42, .08); overflow: hidden; }
    .panel-head { min-height: 68px; padding: 20px 26px; border-bottom: 1px solid #dbe3ef; display: flex; align-items: center; justify-content: space-between; }
    .panel-body { padding: 26px; display: grid; gap: 18px; }
    label { display: grid; gap: 8px; color: #42526b; font-weight: 800; }
    .input, .select, textarea { width: 100%; border: 1px solid #cbd6e6; border-radius: 8px; background: #fff; color: #172033; padding: 0 14px; }
    .input, .select { height: 48px; }
    textarea { min-height: 108px; padding-top: 12px; resize: vertical; }
    .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn { height: 42px; border: 1px solid #cbd6e6; border-radius: 8px; background: #fff; color: #42526b; padding: 0 16px; font-weight: 800; cursor: pointer; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .link-btn { height: 42px; border: 1px solid #cbd6e6; border-radius: 8px; background: #fff; color: #42526b; padding: 0 16px; font-weight: 800; display: inline-flex; align-items: center; text-decoration: none; }
    .btn.primary { width: 100%; border-color: #2457f5; background: #2457f5; color: #fff; }
    .btn.danger { border-color: #fecaca; color: #dc2626; background: #fff5f5; }
    .alert { display: none; border-radius: 8px; padding: 12px 14px; font-weight: 800; }
    .alert.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .alert.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 860px; }
    th, td { padding: 16px 20px; border-bottom: 1px solid #dbe3ef; text-align: left; vertical-align: top; }
    th { color: #8ea0ba; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
    td { font-weight: 500; }
    .status { display: inline-flex; height: 28px; align-items: center; border-radius: 999px; padding: 0 12px; font-weight: 800; }
    .status.pending { background: #fff8e7; color: #b45309; }
    .status.approved { background: #e8fbf2; color: #047857; }
    .status.rejected { background: #fff0f0; color: #dc2626; }
    .status.cancelled { background: #edf2ff; color: #2457f5; }
    .empty { color: #64748b; padding: 20px; text-align: center; }
    @media (max-width: 980px) { .grid, .date-grid { grid-template-columns: 1fr; } .topbar, .page { padding-left: 18px; padding-right: 18px; } }
    @media (max-width: 760px) {
      .topbar { height: auto; padding: 18px; align-items: flex-start; gap: 14px; flex-direction: column; }
      .top-actions { flex-wrap: wrap; width: 100%; }
      .link-btn, .btn.danger { flex: 1 1 160px; justify-content: center; }
      .page { padding-top: 28px; }
    }
  </style>
</head>
<body data-role="staff">
  <header class="topbar">
    <div>
      <h2>My Leave</h2>
      <p class="muted">Logged in as <strong id="userName">-</strong> · <span id="userRole">-</span></p>
    </div>
    <div class="top-actions">
      <a class="link-btn" href="/staff/dashboard.html">Dashboard</a>
      <a class="link-btn" href="/staff/attendanceTracking.html">My Attendance</a>
      <button class="btn danger" id="logoutButton" type="button">Sign Out</button>
    </div>
  </header>
  <main class="page">
    <div>
      <h1>My Leave</h1>
      <p class="subtitle">Submit and track your leave requests</p>
    </div>
    <div id="leaveAlert" class="alert"></div>
    <div class="grid">
      <section class="panel">
        <div class="panel-head"><h2>New Leave Request</h2></div>
        <form class="panel-body" id="leaveForm">
          <label>Leave Type
            <select class="select" id="leaveType" required>
              <option value="annual">Annual Leave</option>
              <option value="sick">Sick Leave</option>
              <option value="personal">Personal Leave</option>
              <option value="unpaid">Unpaid Leave</option>
              <option value="maternity">Maternity Leave</option>
              <option value="paternity">Paternity Leave</option>
            </select>
          </label>
          <div class="date-grid">
            <label>From Date <input class="input" id="startDate" type="date" required /></label>
            <label>To Date <input class="input" id="endDate" type="date" required /></label>
          </div>
          <label>Reason <textarea id="reason" maxlength="500" required></textarea></label>
          <button class="btn primary" id="submitLeave" type="submit">Submit Request</button>
        </form>
      </section>
      <section class="panel">
        <div class="panel-head"><h2>My Leave History</h2></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Dates</th>
                <th>Days</th>
                <th>Status</th>
                <th>Reason / HR Note</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="leaveHistoryBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
  <script src="/js/pageTransitions.js"></script>
  <script src="/js/leaveRequest.js"></script>
</body>
</html>
