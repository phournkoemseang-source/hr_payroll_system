<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard - HRPayroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; overflow-x: hidden; animation: pageIn .16s ease-out both; transition: opacity .14s ease, transform .14s ease; }
    body.is-navigating { opacity: 0; transform: translateY(4px); pointer-events: none; }
    .badge { background: #dcfce7; color: #15803d; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: 0; text-align: center; line-height: 1.15; }
    p { color: #64748b; font-size: 15px; }
    .user-info { width: min(720px, 100%); background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px 28px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin: 20px 0 8px; text-align: left; }
    .summary-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; background: #f8fafc; }
    .summary-item span { display: block; color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .summary-item strong { color: #0f172a; font-size: 16px; }
    .logout-btn { margin-top: 12px; min-height: 42px; padding: 10px 24px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .logout-btn:hover { background: #dc2626; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 760px) {
      body { justify-content: flex-start; padding: 28px 16px; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      body { padding: 22px 12px; }
      h1 { font-size: 24px; }
      .user-info { padding: 20px 16px; border-radius: 10px; }
      .summary { grid-template-columns: 1fr; gap: 10px; }
      .summary-item { padding: 13px; }
      .logout-btn { width: 100%; }
    }
  </style>
</head>
<body data-role="staff">
  <div class="badge">Staff Portal</div>
  <h1>Staff Dashboard</h1>
  <div class="user-info">
    <p>Logged in as: <strong id="userName">-</strong></p>
    <p style="margin-top:4px">Role: <strong id="userRole">-</strong></p>
    <div class="summary" aria-label="Staff dashboard summary">
      <div class="summary-item"><span>Department</span><strong id="staffDepartment">-</strong></div>
      <div class="summary-item"><span>Position</span><strong id="staffPosition">-</strong></div>
      <div class="summary-item"><span>Today</span><strong id="staffAttendance">Loading</strong></div>
      <div class="summary-item"><span>Pending Leave</span><strong id="staffPendingLeaves">0</strong></div>
      <div class="summary-item"><span>Latest Payroll</span><strong id="staffLatestPayroll">$0</strong></div>
      <div class="summary-item"><span>Data</span><strong id="dashboardStatus">Loading</strong></div>
    </div>
    <a class="logout-btn" href="/staff/attendanceTracking.html">My Attendance</a>
    <button class="logout-btn" id="logoutButton" type="button">Sign Out</button>
  </div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
